<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ModelPort quick start</title>
  <desc id="desc">Four steps to start ModelPort: copy env, start service, configure VS Code Claude, ask with Mimo v2.5 Pro.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbfefd"/>
      <stop offset="63%" stop-color="#eef8f7"/>
      <stop offset="100%" stop-color="#fff4ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#173635" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#17716d"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .title { fill: #102a2a; font: 800 54px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
      .subtitle { fill: #4b6260; font: 500 25px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #d7e7e5; stroke-width: 2; filter: url(#shadow); }
      .step { fill: #102a2a; font: 850 32px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
      .label { fill: #102a2a; font: 800 27px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
      .small { fill: #526865; font: 600 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
      .code { fill: #e9fffb; font: 700 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
      .codeBox { fill: #132f2e; }
      .num { fill: #ffffff; font: 900 28px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
      .line { fill: none; stroke: #17716d; stroke-width: 6; stroke-linecap: round; marker-end: url(#arrow); }
      .chip { fill: #ffffff; stroke: #c9dedb; stroke-width: 2; }
      .chipText { fill: #244946; font: 750 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: 0; }
      .ok { fill: #16a34a; }
      .orange { fill: #ef7d24; }
      .teal { fill: #17716d; }
      .icon { fill: none; stroke: #17716d; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <circle cx="1365" cy="138" r="210" fill="#fff0df" opacity="0.7"/>
  <circle cx="170" cy="770" r="230" fill="#e0f2f0" opacity="0.75"/>

  <text class="title" x="96" y="106">Start ModelPort in four steps</text>
  <text class="subtitle" x="100" y="150">Connect VS Code Claude to Mimo v2.5 Pro through a local gateway</text>

  <g transform="translate(85 245)">
    <rect class="card" width="325" height="330" rx="26"/>
    <circle cx="58" cy="62" r="32" class="teal"/>
    <text class="num" x="50" y="72">1</text>
    <path class="icon" d="M52 128h74l28 28v82H52zM126 128v30h28"/>
    <text class="label" x="42" y="280">Copy env</text>
    <rect class="codeBox" x="42" y="206" width="241" height="48" rx="14"/>
    <text class="code" x="62" y="236">cp .env.example .env</text>
  </g>

  <path class="line" d="M430 410 H444"/>

  <g transform="translate(455 245)">
    <rect class="card" width="325" height="330" rx="26"/>
    <circle cx="58" cy="62" r="32" class="teal"/>
    <text class="num" x="49" y="72">2</text>
    <path class="icon" d="M50 151h96M50 190h74M50 229h112M185 151l44 39-44 39"/>
    <text class="label" x="42" y="280">Start gateway</text>
    <rect class="codeBox" x="42" y="206" width="241" height="48" rx="14"/>
    <text class="code" x="70" y="236">scripts/start.sh</text>
  </g>

  <path class="line" d="M800 410 H819"/>

  <g transform="translate(830 245)">
    <rect class="card" width="325" height="330" rx="26"/>
    <circle cx="58" cy="62" r="32" class="teal"/>
    <text class="num" x="49" y="72">3</text>
    <path class="icon" d="M54 150h164v100H54zM78 178h116M78 212h86"/>
    <text class="label" x="42" y="280">Configure Claude</text>
    <rect class="codeBox" x="42" y="206" width="241" height="48" rx="14"/>
    <text class="code" x="58" y="236">ANTHROPIC_BASE_URL</text>
  </g>

  <path class="line" d="M1175 410 H1194"/>

  <g transform="translate(1165 610)">
    <rect class="chip" width="268" height="52" rx="26"/>
    <circle cx="35" cy="26" r="9" class="ok"/>
    <text class="chipText" x="58" y="33">health ok</text>
  </g>
  <g transform="translate(850 610)">
    <rect class="chip" width="268" height="52" rx="26"/>
    <circle cx="35" cy="26" r="9" class="ok"/>
    <text class="chipText" x="58" y="33">auth ok</text>
  </g>
  <g transform="translate(535 610)">
    <rect class="chip" width="268" height="52" rx="26"/>
    <circle cx="35" cy="26" r="9" class="ok"/>
    <text class="chipText" x="58" y="33">upstream ok</text>
  </g>

  <g transform="translate(1205 245)">
    <rect class="card" width="347" height="330" rx="26"/>
    <circle cx="58" cy="62" r="32" class="orange"/>
    <text class="num" x="49" y="72">4</text>
    <path class="icon" d="M54 160h156a28 28 0 0 1 28 28v14a28 28 0 0 1-28 28H90l-36 35v-35h0"/>
    <text class="label" x="42" y="280">Ask with Mimo</text>
    <rect class="codeBox" x="42" y="206" width="263" height="48" rx="14"/>
    <text class="code" x="68" y="236">model=mimo-v2.5-pro</text>
  </g>

  <g transform="translate(120 722)">
    <rect width="1360" height="78" rx="24" fill="#132f2e"/>
    <circle cx="42" cy="39" r="10" fill="#4ade80"/>
    <text x="68" y="48" fill="#e7fffb" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="800">Use scripts/doctor.sh --upstream to verify VS Code settings, local auth, and real Mimo connectivity.</text>
  </g>
</svg>
